{{ partial "head.html" . }}
<body>
  <div id="blog">
    {{ partial "header.html" . }}
    {{ partial "sidebar.html" . }}
    
    <div id="main" data-behavior="{{ .Scratch.Get "sidebarBehavior" }}">
      <article class="post" id="top">
        <div class="post-content markdown">
          <div class="main-content-wrap">
            <div class="about-page-container">
              <div class="about-profile-header">
                {{ with .Site.Params.Author.picture }}
                  <img class="about-profile-picture" src="{{ . }}" alt="Author picture" />
                {{ end }}
                <h1 class="about-profile-name">{{ .Site.Params.Author.name }}</h1>
              </div>
              
              <div class="about-contact-links">
                <a href="mailto:kevinwang930@hotmail.com" class="about-contact-btn btn-email">
                  <i class="far fa-envelope"></i> kevinwang930@hotmail.com
                </a>
                <a href="https://github.com/kevinwang930" target="_blank" rel="noopener noreferrer" class="about-contact-btn btn-github">
                  <i class="fab fa-github"></i> GitHub
                </a>
              </div>
            </div>
          </div>
        </div>
      </article>
      {{ partial "footer.html" . }}
    </div>
  </div>
  {{ partial "foot.html" . }}
