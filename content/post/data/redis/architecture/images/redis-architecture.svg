<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-label="Redis server architecture">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#37474f"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="#f7f9fb"/>
  <text x="500" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#263238">Redis process architecture</text>
  <text x="500" y="48" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Single-threaded command execution on ae event loop; optional I/O threads for read/write</text>

  <!-- Clients -->
  <g transform="translate(40, 70)">
    <rect width="200" height="100" fill="#ffffff" stroke="#455a64" stroke-width="1.4" rx="5"/>
    <text x="100" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#37474f">Clients</text>
    <text x="100" y="52" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#546e7a">redis-cli / app</text>
    <text x="100" y="70" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">RESP over TCP</text>
    <text x="100" y="88" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">TLS optional</text>
  </g>

  <line x1="240" y1="120" x2="300" y2="120" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Networking -->
  <g transform="translate(300, 70)">
    <rect width="280" height="100" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" rx="5"/>
    <text x="140" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">Networking</text>
    <text x="140" y="52" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">networking.c / connection</text>
    <text x="140" y="70" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">accept, read query, write reply</text>
    <text x="140" y="88" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">client struct + input/output buf</text>
  </g>

  <line x1="580" y1="120" x2="640" y2="120" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Event loop -->
  <g transform="translate(640, 70)">
    <rect width="320" height="100" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="5"/>
    <text x="160" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">ae event loop</text>
    <text x="160" y="52" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">aeMain / beforeSleep</text>
    <text x="160" y="70" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">file events + time events</text>
    <text x="160" y="88" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">epoll / kqueue / select</text>
  </g>

  <line x1="500" y1="170" x2="500" y2="200" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Command path -->
  <g transform="translate(40, 208)">
    <rect width="920" height="88" fill="#ffffff" stroke="#2e7d32" stroke-width="1.4" rx="5"/>
    <rect width="140" height="88" fill="#2e7d32" rx="5"/>
    <rect x="120" width="20" height="88" fill="#2e7d32"/>
    <text x="70" y="40" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Command</text>
    <text x="70" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">path</text>

    <rect x="160" y="16" width="220" height="56" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="270" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">processCommand()</text>
    <text x="270" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">lookup, ACL, arity, keys</text>

    <rect x="400" y="16" width="200" height="56" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="500" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">call()</text>
    <text x="500" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">execute cmd-&#62;proc</text>

    <rect x="620" y="16" width="280" height="56" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="760" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">propagate / reply</text>
    <text x="760" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">AOF, replicas, client buffer</text>
  </g>

  <line x1="500" y1="296" x2="500" y2="326" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Keyspace -->
  <g transform="translate(40, 334)">
    <rect width="920" height="120" fill="#ffffff" stroke="#ef6c00" stroke-width="1.4" rx="5"/>
    <rect width="140" height="120" fill="#ef6c00" rx="5"/>
    <rect x="120" width="20" height="120" fill="#ef6c00"/>
    <text x="70" y="52" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Keyspace</text>
    <text x="70" y="70" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">redisDb</text>

    <rect x="160" y="14" width="240" height="92" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="280" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">kvstore *keys</text>
    <text x="280" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">slot-aware hash tables</text>
    <text x="280" y="76" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">key -&#62; kvobj</text>
    <text x="280" y="94" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">dbFind / dbAdd</text>

    <rect x="420" y="14" width="240" height="92" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="540" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">kvstore *expires</text>
    <text x="540" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">keys with TTL</text>
    <text x="540" y="76" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">active + lazy expire</text>
    <text x="540" y="94" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">expire.c / beforeSleep</text>

    <rect x="680" y="14" width="220" height="92" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="790" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">blocking / WATCH</text>
    <text x="790" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">blocking_keys</text>
    <text x="790" y="76" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">watched_keys</text>
    <text x="790" y="94" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">ready_keys</text>
  </g>

  <line x1="500" y1="454" x2="500" y2="484" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Object model -->
  <g transform="translate(40, 492)">
    <rect width="920" height="100" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.4" rx="5"/>
    <rect width="140" height="100" fill="#6a1b9a" rx="5"/>
    <rect x="120" width="20" height="100" fill="#6a1b9a"/>
    <text x="70" y="42" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Value</text>
    <text x="70" y="60" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">robj</text>

    <rect x="160" y="14" width="170" height="72" fill="#f3e5f5" stroke="#ce93d8" rx="4"/>
    <text x="245" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#4a148c">type</text>
    <text x="245" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">STRING LIST SET</text>
    <text x="245" y="74" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">ZSET HASH STREAM</text>

    <rect x="350" y="14" width="170" height="72" fill="#f3e5f5" stroke="#ce93d8" rx="4"/>
    <text x="435" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#4a148c">encoding</text>
    <text x="435" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">int embstr listpack</text>
    <text x="435" y="74" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">HT quicklist skiplist</text>

    <rect x="540" y="14" width="170" height="72" fill="#f3e5f5" stroke="#ce93d8" rx="4"/>
    <text x="625" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#4a148c">ptr</text>
    <text x="625" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">SDS / dict / rax</text>
    <text x="625" y="74" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">payload pointer</text>

    <rect x="730" y="14" width="170" height="72" fill="#f3e5f5" stroke="#ce93d8" rx="4"/>
    <text x="815" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#4a148c">refcount / lru</text>
    <text x="815" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">lifetime + eviction</text>
    <text x="815" y="74" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">kvobj embeds key</text>
  </g>

  <!-- Bottom persistence row -->
  <g transform="translate(40, 620)">
    <rect width="290" height="72" fill="#ffffff" stroke="#00838f" stroke-width="1.3" rx="4"/>
    <text x="145" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#006064">Persistence</text>
    <text x="145" y="48" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#00838f">RDB snapshot + AOF</text>
    <text x="145" y="64" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">rdb.c / aof.c / BIO</text>

    <rect x="315" width="290" height="72" fill="#ffffff" stroke="#00838f" stroke-width="1.3" rx="4"/>
    <text x="460" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#006064">Replication</text>
    <text x="460" y="48" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#00838f">master -&#62; replica backlog</text>
    <text x="460" y="64" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">replication.c</text>

    <rect x="630" width="290" height="72" fill="#ffffff" stroke="#00838f" stroke-width="1.3" rx="4"/>
    <text x="775" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#006064">Cluster / modules</text>
    <text x="775" y="48" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#00838f">hash slots + RedisModule</text>
    <text x="775" y="64" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">cluster.c / module.c</text>
  </g>
</svg>
