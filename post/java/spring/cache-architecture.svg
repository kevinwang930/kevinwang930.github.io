<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-label="Spring Cache architecture class relation diagram">
  <style>
    .box { fill:#f5f8ff; stroke:#3572b0; stroke-width:2; rx:10; }
    .header { font: bold 18px sans-serif; fill:#1d3c6b; }
    .text { font: 15px sans-serif; fill:#0f1f39; }
    .arrow { fill:none; stroke:#0f1f39; stroke-width:2; marker-end:url(#arrowhead); }
    .small { font: 13px sans-serif; fill:#0f1f39; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#0f1f39" />
    </marker>
  </defs>
  <rect x="80" y="45" width="250" height="90" class="box" />
  <text x="95" y="75" class="header">CacheManager</text>
  <text x="95" y="100" class="text">getCache(name)</text>

  <rect x="380" y="45" width="250" height="90" class="box" />
  <text x="395" y="75" class="header">Cache</text>
  <text x="395" y="100" class="text">get / put / evict / clear</text>

  <rect x="680" y="45" width="250" height="90" class="box" />
  <text x="695" y="75" class="header">Cache.ValueWrapper</text>
  <text x="695" y="100" class="text">stored value holder</text>

  <path d="M330,90 L380,90" class="arrow" />
  <path d="M630,90 L680,90" class="arrow" />

  <rect x="80" y="190" width="250" height="90" class="box" />
  <text x="95" y="220" class="header">CacheInterceptor</text>
  <text x="95" y="245" class="text">around method call</text>

  <rect x="380" y="190" width="250" height="90" class="box" />
  <text x="395" y="220" class="header">CacheOperationSource</text>
  <text x="395" y="245" class="text">reads @Cacheable / @CacheEvict</text>

  <rect x="680" y="190" width="250" height="90" class="box" />
  <text x="695" y="220" class="header">CacheResolver</text>
  <text x="695" y="245" class="text">select cache(s)</text>

  <path d="M205,135 L205,190" class="arrow" />
  <path d="M505,135 L505,190" class="arrow" />
  <path d="M780,135 L780,190" class="arrow" />

  <rect x="80" y="340" width="250" height="90" class="box" />
  <text x="95" y="370" class="header">CacheAspectSupport</text>
  <text x="95" y="395" class="text">base class for interceptors</text>

  <rect x="380" y="340" width="250" height="90" class="box" />
  <text x="395" y="370" class="header">CacheableOperation</text>
  <text x="395" y="395" class="text">metadata for cache action</text>

  <rect x="680" y="340" width="250" height="90" class="box" />
  <text x="695" y="370" class="header">SimpleKeyGenerator</text>
  <text x="695" y="395" class="text">builds cache key from args</text>

  <path d="M205,280 L205,340" class="arrow" />
  <path d="M505,280 L505,340" class="arrow" />
  <path d="M780,280 L780,340" class="arrow" />

  <rect x="240" y="470" width="520" height="110" class="box" />
  <text x="300" y="500" class="header">Spring Cache invocation flow</text>
  <text x="300" y="525" class="small">1. Method intercepted by CacheInterceptor/CacheAspectSupport</text>
  <text x="300" y="545" class="small">2. CacheOperationSource reads annotation and operations</text>
  <text x="300" y="565" class="small">3. CacheResolver selects target cache(s)</text>
  <text x="300" y="585" class="small">4. Cache checks key and returns cached result or proceeds</text>

  <path d="M205,385 L205,470" class="arrow" />
  <path d="M505,385 L505,470" class="arrow" />
  <path d="M780,385 L780,470" class="arrow" />
</svg>
