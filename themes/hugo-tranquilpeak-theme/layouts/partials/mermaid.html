<!-- mermaid.html -->

{{ if or .Params.mermaid (or (in .RawContent "```mermaid") (in .RawContent "``` mermaid")) }}
<script type="module">
    // Replace mermaid pre.code to div safely
    const elements = Array.from(document.getElementsByClassName("language-mermaid"));
    elements.forEach((el) => {
        const pre = el.parentElement;
        const div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = el.textContent;
        if (pre && pre.parentElement) {
            pre.parentElement.replaceChild(div, pre);
        }
    });

    // Match Cursor built-in mermaid defaults:
    // markdown-mermaid.lightModeTheme = "default"
    // markdown-mermaid.darkModeTheme = "dark"
    const getMermaidTheme = () =>
        window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "default";

    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11.12.2/dist/mermaid.esm.min.mjs";
    mermaid.initialize({
        startOnLoad: false,
        theme: getMermaidTheme(),
    });

    try {
        await mermaid.run({
            nodes: document.querySelectorAll(".mermaid"),
        });
    } catch (err) {
        console.error("Mermaid rendering failed:", err);
    }
</script>
<style>
    /* Set svg to center */
    .mermaid svg {
        display: block;
        margin: auto;
    }
</style>
{{ end }}
