<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="280" viewBox="0 0 920 280" role="img" aria-label="Hybrid encryption AES plus RSA">
  <rect width="920" height="280" fill="#f7f9fb"/>
  <text x="460" y="26" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#263238">How encryption is composed in practice (hybrid)</text>
  <text x="460" y="46" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">RSA (or ECDH) transports a fresh AES key; AES encrypts the payload</text>

  <rect x="40" y="80" width="140" height="70" fill="#e3f2fd" stroke="#1565c0" rx="6"/>
  <text x="110" y="110" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#0d47a1">payload M</text>
  <text x="110" y="132" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">(large)</text>

  <line x1="180" y1="115" x2="220" y2="115" stroke="#37474f" stroke-width="2"/>
  <polygon points="220,115 212,110 212,120" fill="#37474f"/>

  <rect x="220" y="70" width="160" height="90" fill="#e8f5e9" stroke="#2e7d32" rx="6"/>
  <text x="300" y="100" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">AES-Encrypt</text>
  <text x="300" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#33691e">random key K</text>
  <text x="300" y="140" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#33691e">from CSPRNG</text>

  <line x1="380" y1="115" x2="420" y2="115" stroke="#37474f" stroke-width="2"/>
  <polygon points="420,115 412,110 412,120" fill="#37474f"/>

  <rect x="420" y="80" width="140" height="70" fill="#fce4ec" stroke="#c2185b" rx="6"/>
  <text x="490" y="110" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#880e4f">C = AES(M)</text>
  <text x="490" y="132" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ad1457">ciphertext</text>

  <rect x="220" y="180" width="160" height="70" fill="#fff8e1" stroke="#f9a825" rx="6"/>
  <text x="300" y="210" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#f57f17">RSA-Encrypt(K)</text>
  <text x="300" y="232" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6d4c41">with recipient public key</text>

  <line x1="300" y1="160" x2="300" y2="180" stroke="#f9a825" stroke-width="2"/>
  <polygon points="300,180 295,172 305,172" fill="#f9a825"/>

  <line x1="380" y1="215" x2="420" y2="215" stroke="#37474f" stroke-width="2"/>
  <polygon points="420,215 412,210 412,220" fill="#37474f"/>

  <rect x="420" y="180" width="140" height="70" fill="#fff8e1" stroke="#f9a825" rx="6"/>
  <text x="490" y="210" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#f57f17">wrap(K)</text>
  <text x="490" y="232" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6d4c41">small RSA blob</text>

  <line x1="560" y1="115" x2="620" y2="150" stroke="#37474f" stroke-width="2"/>
  <line x1="560" y1="215" x2="620" y2="180" stroke="#37474f" stroke-width="2"/>
  <polygon points="620,165 610,160 612,172" fill="#37474f"/>

  <rect x="620" y="120" width="260" height="100" fill="#eceff1" stroke="#546e7a" rx="8"/>
  <text x="750" y="155" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#37474f">Send over the wire</text>
  <text x="750" y="180" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#455a64">wrap(K)  +  C</text>
  <text x="750" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">Receiver: RSA-decrypt K, then AES-decrypt C</text>

  <text x="460" y="270" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">This is the usual pattern in TLS, messaging, and file encryption formats</text>
</svg>
