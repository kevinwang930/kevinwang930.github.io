<style>
  /* Custom CSS to improve layout width responsiveness and horizontal header nav */

  :root {
    --sidebar-width: 0px;
    --main-content-width: 100%;
  }

  /* Tablet screen width (768px to 1023px) */
  @media only screen and (min-width: 768px) {
    :root {
      --sidebar-width: 0px;
      --main-content-width: 720px;
    }
  }

  /* Standard desktop screen width (1024px to 1279px) */
  @media only screen and (min-width: 1024px) {
    :root {
      --sidebar-width: 0px;
      --main-content-width: 800px;
    }
  }

  /* Widescreen desktop screen width (1280px and up) */
  @media only screen and (min-width: 1280px) {
    :root {
      --sidebar-width: 0px;
      --main-content-width: 900px;
    }
  }

  /* Base Body and Main layout background */
  body, #main {
    background-color: #f8fafc !important; /* Soft slate/blue background */
  }

  /* Center main content wrapping */
  .main-content-wrap {
    max-width: 1400px !important;
    width: 100% !important;
    padding-left: 24px !important;
    padding-right: 24px !important;
    margin: 0 auto !important;
    box-sizing: border-box !important;
  }

  /* Ensure code blocks scale correctly and scroll horizontally on overflow */
  .codeblock .code pre,
  figure.highlight .code pre {
    max-width: min(calc(var(--main-content-width) - 50px), calc(100vw - 90px)) !important;
  }

  /* Ensure modals match the content width */
  .modal {
    max-width: var(--main-content-width) !important;
  }

  /* Ensure post cover titles and metadata match the content width */
  .post-header-cover .post-header .post-title,
  .post-header-cover .post-header .post-meta {
    max-width: var(--main-content-width) !important;
  }

  /* Completely remove left sidebar and reset main container offsets */
  #sidebar {
    display: none !important;
  }

  #main {
    width: 100% !important;
    float: none !important;
    margin-left: 0 !important;
    padding-left: 0 !important;
    transform: none !important;
  }

  body {
    padding-top: 60px !important; /* Offset for fixed top header */
  }

  /* Fixed Header overrides */
  #header {
    display: block !important;
    left: 0 !important;
    width: 100% !important;
    transform: none !important;
    background: rgba(255, 255, 255, 0.8) !important;
    backdrop-filter: blur(16px) !important;
    -webkit-backdrop-filter: blur(16px) !important;
    border-bottom: 1px solid rgba(226, 232, 240, 0.8) !important;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02) !important;
    z-index: 1000 !important;
    height: 60px !important;
  }

  #bottom-bar,
  .post-bottom-bar {
    margin-left: 0 !important;
    left: 0 !important;
    width: 100% !important;
    transform: none !important;
  }

  /* Style the top horizontal header navigation */
  .header-container {
    max-width: 1400px !important;
    margin: 0 auto !important;
    padding-left: 24px !important;
    padding-right: 24px !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 100%;
    position: relative;
    box-sizing: border-box;
  }

  .header-title {
    text-align: left !important;
    line-height: 60px !important;
    float: none !important;
    margin: 0 !important;
  }

  .header-title-link {
    font-size: 20px !important;
    font-weight: 700 !important;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    text-decoration: none !important;
  }

  .header-nav {
    display: flex;
    margin-left: auto;
    margin-right: 40px; /* Space before the profile picture */
  }

  .header-nav-list {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 30px;
  }

  .header-nav-item {
    margin: 0;
  }

  .header-nav-link {
    color: #475569 !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    line-height: 60px !important;
    display: inline-block;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: color 0.2s;
    text-decoration: none;
    position: relative;
  }

  .header-nav-link::after {
    content: '';
    position: absolute;
    width: 100%;
    transform: scaleX(0);
    height: 2px;
    bottom: 14px;
    left: 0;
    background: linear-gradient(90deg, #4f46e5, #7c3aed) !important;
    transform-origin: bottom right;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .header-nav-link:hover::after {
    transform: scaleX(1);
    transform-origin: bottom left;
  }

  .header-nav-link:hover {
    color: #1e293b !important;
    text-decoration: none;
  }

  .header-right-picture {
    display: flex;
    align-items: center;
  }

  .header-picture {
    width: 36px !important;
    height: 36px !important;
    border-radius: 50% !important;
    border: 2px solid #e0e7ff !important;
    transition: border-color 0.2s !important;
  }

  .header-picture:hover {
    border-color: #4f46e5 !important;
  }

  /* Custom separate About page style */
  .about-page-container {
    max-width: 480px !important;
    margin: 60px auto !important;
    text-align: center !important;
    background: #fff !important;
    border: 1px solid rgba(226, 232, 240, 0.8) !important;
    border-radius: 24px !important;
    padding: 48px !important;
    box-shadow: 0 10px 30px -10px rgba(148, 163, 184, 0.12), 0 1px 3px rgba(0, 0, 0, 0.05) !important;
    transition: transform 0.3s ease, box-shadow 0.3s ease !important;
    box-sizing: border-box !important;
  }

  .about-page-container:hover {
    transform: translateY(-5px) !important;
    box-shadow: 0 20px 40px -15px rgba(79, 70, 229, 0.15) !important;
    border-color: rgba(79, 70, 229, 0.3) !important;
  }

  .about-profile-picture {
    width: 120px !important;
    height: 120px !important;
    border-radius: 50% !important;
    object-fit: cover !important;
    border: 4px solid #e0e7ff !important;
    box-shadow: 0 4px 10px rgba(79, 70, 229, 0.1) !important;
    margin-bottom: 20px !important;
  }

  .about-profile-name {
    font-size: 26px !important;
    font-weight: 800 !important;
    margin-bottom: 32px !important;
    color: #1e293b !important;
  }

  .about-contact-links {
    display: flex !important;
    flex-direction: column !important;
    gap: 16px !important;
    align-items: stretch !important;
  }

  .about-contact-btn {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 12px !important;
    padding: 14px 20px !important;
    border-radius: 12px !important;
    font-size: 15px !important;
    font-weight: 600 !important;
    text-decoration: none !important;
    transition: all 0.2s ease-in-out !important;
    box-sizing: border-box !important;
  }

  .btn-email {
    background: #f1f5f9 !important;
    color: #475569 !important;
    border: 1px solid #e2e8f0 !important;
  }

  .btn-email:hover {
    background: #e2e8f0 !important;
    color: #1e293b !important;
  }

  .btn-github {
    background: #0f172a !important;
    color: #ffffff !important;
  }

  .btn-github:hover {
    background: #1e293b !important;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2) !important;
  }

  /* 2-column layout for post list + right sidebar */
  .blog-layout-container {
    display: flex !important;
    flex-direction: row !important;
    gap: 32px !important;
    align-items: flex-start !important;
    width: 100% !important;
    margin-top: 40px !important;
    margin-bottom: 40px !important;
  }

  /* POST LIST COLUMN - vertical card column style (one card per row) */
  .post-list-column {
    display: flex !important;
    flex-direction: column !important;
    gap: 16px !important;
    flex: 1 !important;
    min-width: 0 !important;
  }

  /* Compact Modern Card Layout for Blog Posts */
  .postShorten-card {
    background: #fff !important;
    border: 1px solid rgba(226, 232, 240, 0.8) !important;
    border-radius: 12px !important;
    padding: 0 !important;
    margin-bottom: 0 !important;
    box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.06), 0 2px 8px -1px rgba(148, 163, 184, 0.03) !important;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s !important;
    box-sizing: border-box !important;
    width: 100% !important;
    display: flex !important;
    flex-direction: column !important;
    overflow: hidden !important;
  }

  .postShorten-card:hover {
    transform: translateY(-3px) !important;
    box-shadow: 0 16px 20px -5px rgba(148, 163, 184, 0.1), 0 8px 8px -5px rgba(148, 163, 184, 0.04) !important;
    border-color: rgba(79, 70, 229, 0.4) !important;
  }

  /* Responsive row layout for cards with thumbnails on desktop */
  @media only screen and (min-width: 768px) {
    .postShorten-card.has-thumbnail {
      flex-direction: row !important;
      align-items: stretch !important;
    }

    .postShorten-card-image-wrap {
      width: 240px !important;
      flex-shrink: 0 !important;
      height: auto !important;
      border-bottom: none !important;
      border-right: 1px solid rgba(226, 232, 240, 0.5) !important;
    }
  }

  .postShorten-card-image-wrap {
    width: 100%;
    height: 160px;
    overflow: hidden !important;
    position: relative !important;
    background: #f1f5f9 !important;
    border-bottom: 1px solid rgba(226, 232, 240, 0.5) !important;
  }

  .postShorten-card-image {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
  }

  .postShorten-card:hover .postShorten-card-image {
    transform: scale(1.04) !important;
  }

  .postShorten-card-content {
    padding: 14px 18px !important;
    display: flex !important;
    flex-direction: column !important;
    flex-grow: 1 !important;
    justify-content: space-between !important;
  }

  .postShorten-card-top {
    display: flex !important;
    flex-direction: column !important;
  }

  .postShorten-card-categories {
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 4px !important;
    margin-bottom: 4px !important;
  }

  .postShorten-card-category-tag {
    font-size: 10px !important;
    font-weight: 700 !important;
    color: #4f46e5 !important;
    background: #e0e7ff !important;
    padding: 4px 10px !important;
    line-height: 1.25 !important;
    border-radius: 9999px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    text-decoration: none !important;
    transition: background-color 0.15s, color 0.15s !important;
  }

  .postShorten-card-category-tag:hover {
    background: #c7d2fe !important;
    color: #3730a3 !important;
    text-decoration: none !important;
  }

  .postShorten-card-title {
    font-size: 22px !important;
    font-weight: 850 !important;
    margin: 0 0 2px 0 !important;
    line-height: 1.3 !important;
  }

  .postShorten-card-title a {
    color: #1e293b !important;
    text-decoration: none !important;
    transition: color 0.15s !important;
  }

  .postShorten-card-title a:hover {
    color: #4f46e5 !important;
    text-decoration: none !important;
  }

  .postShorten-card-meta {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    font-size: 11px !important;
    color: #94a3b8 !important;
    margin-bottom: 5px !important;
  }

  .postShorten-card-meta i {
    color: #94a3b8 !important;
  }

  .postShorten-card-date,
  .postShorten-card-readingtime {
    display: flex !important;
    align-items: center !important;
    gap: 5px !important;
  }

  .postShorten-card-excerpt {
    font-size: 13px !important;
    color: #64748b !important;
    line-height: 1.45 !important;
    margin: 0 !important;
    display: -webkit-box !important;
    -webkit-line-clamp: 3 !important;
    -webkit-box-orient: vertical !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
  }

  .postShorten-card-excerpt p {
    margin: 0 !important;
    padding: 0 !important;
    line-height: 1.45 !important;
  }

  .postShorten-card-bottom {
    display: flex !important;
    flex-direction: column !important;
    margin-top: 6px !important;
    border-top: 1px solid #f1f5f9 !important;
    padding-top: 6px !important;
  }

  .postShorten-card-tags-action {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    flex-wrap: wrap !important;
    gap: 12px !important;
  }

  .postShorten-card-tags {
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 6px !important;
  }

  .postShorten-card-tag {
    font-size: 10px !important;
    font-weight: 550 !important;
    color: #64748b !important;
    background: #f1f5f9 !important;
    padding: 4px 10px !important;
    line-height: 1.25 !important;
    border-radius: 4px !important;
    text-decoration: none !important;
    transition: all 0.15s !important;
  }

  .postShorten-card-tag:hover {
    color: #4f46e5 !important;
    background: #e0e7ff !important;
    text-decoration: none !important;
  }

  .postShorten-card-readmore {
    font-size: 12px !important;
    font-weight: 600 !important;
    color: #4f46e5 !important;
    text-decoration: none !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 6px !important;
    transition: color 0.15s !important;
  }

  .postShorten-card-readmore i {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
  }

  .postShorten-card:hover .postShorten-card-readmore i {
    transform: translateX(4px) !important;
  }

  .postShorten-card-readmore:hover {
    color: #3730a3 !important;
    text-decoration: none !important;
  }

  /* Pagination bar as a matching card */
  .pagination-bar {
    width: 100% !important;
    background: #fff !important;
    border: 1px solid rgba(226, 232, 240, 0.8) !important;
    border-radius: 16px !important;
    padding: 16px 24px !important;
    box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.05) !important;
    box-sizing: border-box !important;
    display: flex !important;
    justify-content: center !important;
  }

  .pagination {
    margin: 0 !important;
    padding: 0 !important;
    display: flex !important;
    align-items: center !important;
    gap: 15px !important;
    list-style: none !important;
  }

  .pagination li {
    display: inline-block !important;
    margin: 0 !important;
  }

  .pagination-number {
    font-size: 13px !important;
    color: #64748b !important;
    font-weight: 600 !important;
  }

  /* Right Sidebar widgets styling */
  .sidebar-right {
    width: 280px !important;
    flex-shrink: 0 !important;
    position: sticky !important;
    top: 90px !important;
  }

  .sidebar-right-widget {
    background: #fff !important;
    border: 1px solid rgba(226, 232, 240, 0.8) !important;
    border-radius: 16px !important;
    padding: 24px !important;
    margin-bottom: 24px !important;
    width: 100% !important;
    box-sizing: border-box !important;
    box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.06) !important;
    transition: transform 0.3s ease, box-shadow 0.3s ease !important;
  }

  .sidebar-right-widget:hover {
    transform: translateY(-3px) !important;
    box-shadow: 0 12px 25px -5px rgba(148, 163, 184, 0.1) !important;
  }

  .widget-title {
    font-size: 13px !important;
    font-weight: 800 !important;
    color: #1e293b !important;
    text-transform: uppercase;
    letter-spacing: 1px !important;
    margin-top: 0;
    margin-bottom: 20px !important;
    border-bottom: none !important;
    padding-bottom: 0 !important;
    border-left: 3px solid #4f46e5 !important;
    padding-left: 10px !important;
    line-height: 1.2 !important;
  }

  .widget-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .widget-list-item {
    margin-bottom: 12px !important;
    font-size: 13px;
  }

  .widget-list-item:last-child {
    margin-bottom: 0;
  }

  .widget-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #475569 !important;
    text-decoration: none;
    transition: all 0.25s ease !important;
    font-weight: 550 !important;
  }

  .widget-link:hover {
    color: #4f46e5 !important;
    transform: translateX(3px) !important;
    text-decoration: none;
  }

  .widget-link.active {
    color: #4f46e5 !important;
    font-weight: 700 !important;
    padding-left: 6px !important;
    border-left: 2px solid #4f46e5 !important;
  }

  .widget-count {
    background: #f1f5f9 !important;
    color: #64748b !important;
    font-size: 10px !important;
    font-weight: 700 !important;
    padding: 2px 8px !important;
    border-radius: 20px !important;
    transition: all 0.25s ease !important;
  }

  .widget-link:hover .widget-count,
  .widget-link.active .widget-count {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%) !important;
    color: #fff !important;
  }

  .widget-tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px !important;
  }

  .widget-tag-item {
    font-size: 11px !important;
    font-weight: 600 !important;
    color: #475569 !important;
    background: #f8fafc !important;
    border: 1px solid #e2e8f0 !important;
    padding: 5px 12px !important;
    border-radius: 20px !important;
    transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
    text-decoration: none;
    display: inline-block;
  }

  .widget-tag-item:hover,
  .widget-tag-item.active {
    color: #fff !important;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%) !important;
    border-color: transparent !important;
    text-decoration: none;
  }

  .widget-tag-item:hover {
    transform: scale(1.05) !important;
    box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2) !important;
  }

  .widget-tag-item.active {
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15) !important;
  }

  /* Responsiveness media queries */
  @media only screen and (max-width: 991px) {
    .blog-layout-container {
      flex-direction: column !important;
      gap: 32px !important;
    }
    .sidebar-right {
      width: 100% !important;
      position: static !important;
      margin-top: 20px !important;
    }
    /* No grid override needed since post-list-column is now a flex column */
  }

  @media only screen and (max-width: 767px) {
    .header-container {
      flex-direction: column !important;
      height: auto !important;
      padding: 12px !important;
    }
    .header-nav {
      margin: 10px 0 0 0 !important;
      width: 100% !important;
      justify-content: center !important;
    }
    .header-nav-list {
      gap: 20px !important;
    }
    .header-nav-link {
      line-height: 32px !important;
    }
    .header-right-picture {
      position: static !important;
      margin-top: 10px !important;
    }
    body {
      padding-top: 120px !important; /* Larger offset on mobile for taller header */
    }
    #header {
      height: auto !important;
    }
    .main-content-wrap {
      padding-left: 16px !important;
      padding-right: 16px !important;
    }

    /* Card responsive stacking */
    .postShorten-card {
      flex-direction: column !important;
    }
    .postShorten-card-image-wrap {
      width: 100% !important;
      height: 150px !important;
      border-right: none !important;
      border-bottom: 1px solid rgba(226, 232, 240, 0.5) !important;
    }
  }
</style>

<header id="header">
  <!-- Hidden toggle button to prevent theme JavaScript errors -->
  <i id="btn-open-sidebar" style="display: none !important;"></i>
  
  <div class="header-container">
    <div class="header-title">
      <a class="header-title-link" href="{{ "/" | relLangURL }}">{{ .Site.Title }}</a>
    </div>
    
    <nav class="header-nav">
      <ul class="header-nav-list">
        {{ range .Site.Menus.main }}
          <li class="header-nav-item">
            <a class="header-nav-link" href="{{ .URL | relLangURL }}">
              {{ .Name }}
            </a>
          </li>
        {{ end }}
      </ul>
    </nav>
    
    {{ with .Site.Params.header.rightLink }}
      {{ if and (in .url ":") (not (in .url (printf "%s" $.Site.BaseURL))) }}
        <a class="header-right-picture" href="{{ .url | safeURL }}" target="_blank" rel="noopener" aria-label="About">
      {{ else }}
        <a class="header-right-picture" href="{{ .url | safeURL }}" aria-label="About">
      {{ end }}
        {{ with ($.Scratch.Get "authorPicture") }}
          <img class="header-picture" src="{{ . }}{{ if in . "//www.gravatar.com/avatar/" }}?s=90{{ end }}" alt="Author" />
        {{ end }}
      </a>
    {{ end }}
  </div>
</header>
