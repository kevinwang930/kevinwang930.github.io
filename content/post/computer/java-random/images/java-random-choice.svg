<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" role="img" aria-label="Java random lineage selection">
  <rect width="920" height="480" fill="#f7f9fb"/>
  <text x="460" y="26" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#263238">Lineage selection (no unified JDK subsystem)</text>
  <text x="460" y="46" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Three independent lineages; select by adversarial unpredictability, then stream shape</text>

  <!-- Decision root -->
  <rect x="310" y="64" width="300" height="56" fill="#eceff1" stroke="#546e7a" stroke-width="1.5" rx="6"/>
  <text x="460" y="88" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#37474f">Adversarial unpredictability required?</text>
  <text x="460" y="108" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">(adversary must not predict subsequent outputs)</text>

  <!-- Yes branch -->
  <line x1="310" y1="92" x2="160" y2="92" stroke="#2e7d32" stroke-width="2"/>
  <line x1="160" y1="92" x2="160" y2="140" stroke="#2e7d32" stroke-width="2"/>
  <text x="230" y="84" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#2e7d32">yes</text>

  <rect x="40" y="140" width="240" height="100" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" rx="8"/>
  <text x="160" y="168" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1b5e20">JCA crypto lineage</text>
  <text x="160" y="190" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#2e7d32">SecureRandom</text>
  <text x="160" y="212" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#33691e">keys, tokens, IVs, salts</text>
  <text x="160" y="228" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">java.security (+ providers)</text>

  <!-- No branch -->
  <line x1="610" y1="92" x2="700" y2="92" stroke="#1565c0" stroke-width="2"/>
  <line x1="700" y1="92" x2="700" y2="140" stroke="#1565c0" stroke-width="2"/>
  <text x="655" y="84" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#1565c0">no</text>

  <rect x="560" y="140" width="320" height="48" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="6"/>
  <text x="720" y="170" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#0d47a1">Non-crypto PRNG lineages</text>

  <!-- Second decision -->
  <line x1="720" y1="188" x2="720" y2="210" stroke="#1565c0" stroke-width="2"/>
  <rect x="580" y="210" width="280" height="44" fill="#eceff1" stroke="#546e7a" stroke-width="1.2" rx="5"/>
  <text x="720" y="238" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#37474f">Independent parallel streams required?</text>

  <line x1="580" y1="232" x2="200" y2="280" stroke="#f9a825" stroke-width="2"/>
  <line x1="860" y1="232" x2="780" y2="280" stroke="#1565c0" stroke-width="2"/>
  <text x="360" y="265" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#f57f17">yes</text>
  <text x="820" y="265" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#1565c0">no</text>

  <rect x="40" y="280" width="320" height="100" fill="#fff8e1" stroke="#f9a825" stroke-width="1.6" rx="8"/>
  <text x="200" y="308" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#f57f17">Stream / split lineage</text>
  <text x="200" y="330" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#f57f17">SplittableRandom</text>
  <text x="200" y="348" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#6d4c41">RandomGenerator (LXM, ...)</text>
  <text x="200" y="368" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">java.util / java.util.random</text>

  <rect x="520" y="280" width="360" height="100" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="8"/>
  <text x="700" y="308" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">General PRNG lineage</text>
  <text x="700" y="330" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">ThreadLocalRandom (concurrent)</text>
  <text x="700" y="348" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">Random / Math.random (owned)</text>
  <text x="700" y="368" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">java.util / java.util.concurrent</text>

  <text x="460" y="420" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#455a64">Historical APIs in util, concurrency, and JCA; no single RandomService</text>
  <text x="460" y="444" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">Java 17 RandomGenerator unifies PRNG invocation; SecureRandom remains the CSPRNG path</text>
  <text x="460" y="466" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">Pseudorandom generation is not encryption; cryptography consumes SecureRandom output</text>
</svg>
