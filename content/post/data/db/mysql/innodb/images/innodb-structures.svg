<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" width="100%" height="100%">
  <!-- Definitions for arrows and filters -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#37474f" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="550" fill="#fcfcfc" rx="8" />

  <!-- Header -->
  <text x="425" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">InnoDB Engine Architecture: Memory vs. Disk</text>

  <!-- IN-MEMORY STRUCTURES -->
  <g transform="translate(30, 60)" filter="url(#shadow)">
    <!-- Container -->
    <rect width="360" height="440" fill="#ffffff" stroke="#1565c0" stroke-width="2" rx="6" />
    <rect width="360" height="40" fill="#1565c0" rx="6" />
    <text x="180" y="26" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">RAM: In-Memory Structures</text>

    <!-- Buffer Pool -->
    <g transform="translate(15, 60)">
      <rect width="330" height="180" fill="#e3f2fd" stroke="#0d47a1" stroke-width="1.5" rx="4" />
      <text x="165" y="22" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d47a1">Buffer Pool (Data &amp; Index Pages)</text>
      
      <!-- LRU Split -->
      <g transform="translate(15, 35)">
        <rect width="140" height="70" fill="#ffffff" stroke="#1565c0" stroke-width="1" rx="3" />
        <text x="70" y="20" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1565c0">New Sublist (5/8)</text>
        <text x="70" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">Hot Pages</text>
        <text x="70" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">(Young block promotions)</text>

        <rect x="160" y="0" width="140" height="70" fill="#ffffff" stroke="#1565c0" stroke-width="1" rx="3" />
        <text x="230" y="20" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1565c0">Old Sublist (3/8)</text>
        <text x="230" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">Cold/Eviction candidate</text>
        <text x="230" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">(Midpoint Insertion Point)</text>

        <!-- Promotion Arrow -->
        <path d="M 160 35 L 145 35" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow)" />
        <text x="152" y="28" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#2e7d32" font-weight="bold">Promote</text>
      </g>

      <!-- Other Buffer Pool lists -->
      <rect x="15" y="118" width="90" height="45" fill="#f1f8e9" stroke="#33691e" stroke-width="1" rx="3" />
      <text x="60" y="138" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#33691e">Free List</text>
      
      <rect x="120" y="118" width="90" height="45" fill="#ffeec2" stroke="#ff8f00" stroke-width="1" rx="3" />
      <text x="165" y="138" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#ff8f00">Flush List</text>
      <text x="165" y="152" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#a05000">Dirty Pages</text>

      <rect x="225" y="118" width="90" height="45" fill="#e1f5fe" stroke="#0288d1" stroke-width="1" rx="3" />
      <text x="270" y="144" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#0288d1">Unused Pages</text>
    </g>

    <!-- Change Buffer -->
    <g transform="translate(15, 255)">
      <rect width="155" height="70" fill="#f3e5f5" stroke="#4a148c" stroke-width="1" rx="4" />
      <text x="77" y="24" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a148c">Change Buffer</text>
      <text x="77" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">Caches Secondary</text>
      <text x="77" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">Index modifications</text>
    </g>

    <!-- Adaptive Hash Index -->
    <g transform="translate(190, 255)">
      <rect width="155" height="70" fill="#e0f2f1" stroke="#004d40" stroke-width="1" rx="4" />
      <text x="77" y="24" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#004d40">Adaptive Hash Index</text>
      <text x="77" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#00796b">Hot page point</text>
      <text x="77" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#00796b">lookups O(1)</text>
    </g>

    <!-- Log Buffer -->
    <g transform="translate(15, 345)">
      <rect width="330" height="75" fill="#fbe9e7" stroke="#d84315" stroke-width="1.5" rx="4" />
      <text x="165" y="24" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#c62828">Log Buffer (Redo Log cache)</text>
      <text x="165" y="44" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#bf360c">Caches redo log records before flushing to disk.</text>
      <text x="165" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#ff7043" font-weight="bold">Controlled by innodb_flush_log_at_trx_commit</text>
    </g>
  </g>

  <!-- ON-DISK STRUCTURES -->
  <g transform="translate(460, 60)" filter="url(#shadow)">
    <!-- Container -->
    <rect width="360" height="440" fill="#ffffff" stroke="#4e342e" stroke-width="2" rx="6" />
    <rect width="360" height="40" fill="#4e342e" rx="6" />
    <text x="180" y="26" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Disk: On-Disk Structures</text>

    <!-- File-Per-Table Tablespace (.ibd) -->
    <g transform="translate(15, 60)">
      <rect width="330" height="150" fill="#efebe9" stroke="#4e342e" stroke-width="1.5" rx="4" />
      <text x="165" y="22" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#4e342e">File-Per-Table Tablespaces (*.ibd)</text>
      
      <!-- Clustered Index -->
      <rect x="15" y="38" width="140" height="95" fill="#ffffff" stroke="#5d4037" stroke-width="1" rx="3" />
      <text x="85" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#5d4037">Clustered Index</text>
      <text x="85" y="76" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#7d5d4d">B+ Tree ordered by PK</text>
      <text x="85" y="90" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#7d5d4d">Leaf Pages store</text>
      <text x="85" y="104" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#2e7d32" font-weight="bold">ACTUAL ROW DATA</text>

      <!-- Secondary Index -->
      <rect x="175" y="38" width="140" height="95" fill="#ffffff" stroke="#5d4037" stroke-width="1" rx="3" />
      <text x="245" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#5d4037">Secondary Indexes</text>
      <text x="245" y="76" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#7d5d4d">B+ Trees for other fields</text>
      <text x="245" y="90" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#7d5d4d">Leaf Pages store</text>
      <text x="245" y="104" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#c62828" font-weight="bold">PRIMARY KEY POINTER</text>
    </g>

    <!-- System Tablespace -->
    <g transform="translate(15, 225)">
      <rect width="330" height="60" fill="#f5f5f5" stroke="#757575" stroke-width="1" rx="4" />
      <text x="165" y="24" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#424242">System Tablespace (ibdata1)</text>
      <text x="165" y="44" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#616162">Houses the Doublewrite Buffer, Change Buffer, etc.</text>
    </g>

    <!-- Undo Tablespaces -->
    <g transform="translate(15, 297)">
      <rect width="155" height="55" fill="#eceff1" stroke="#37474f" stroke-width="1" rx="4" />
      <text x="77" y="24" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#37474f">Undo Tablespaces</text>
      <text x="77" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#455a64">Undo Logs / MVCC reads</text>
    </g>

    <!-- Temp Tablespaces -->
    <g transform="translate(190, 297)">
      <rect width="155" height="55" fill="#f5f5f5" stroke="#607d8b" stroke-width="1" rx="4" />
      <text x="77" y="24" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#37474f">Temp Tablespaces</text>
      <text x="77" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#455a64">Disk-based query temps</text>
    </g>

    <!-- Redo Logs -->
    <g transform="translate(15, 365)">
      <rect width="330" height="55" fill="#ffebee" stroke="#b71c1c" stroke-width="1.5" rx="4" />
      <text x="165" y="22" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#b71c1c">Redo Logs (ib_logfile0, ib_logfile1)</text>
      <text x="165" y="40" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#c62828">Circular log files securing Durability (Write-Ahead Log)</text>
    </g>
  </g>

  <!-- INTER-STRUCTURE ARROWS (FLUSHING PATHS) -->
  <!-- Log Buffer to Redo Logs -->
  <path d="M 375 425 Q 425 435, 475 425" fill="none" stroke="#b71c1c" stroke-dasharray="4,3" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="395" y="400" width="60" height="20" rx="3" fill="#ffebee" stroke="#b71c1c" stroke-width="0.5" />
  <text x="425" y="412" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold" fill="#b71c1c">Log Flush</text>

  <!-- Buffer Pool Flush List to Disk (Tablespace / Doublewrite) -->
  <path d="M 375 190 Q 425 180, 475 190" fill="none" stroke="#ff8f00" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="395" y="152" width="60" height="20" rx="3" fill="#fffde7" stroke="#ff8f00" stroke-width="0.5" />
  <text x="425" y="164" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold" fill="#ff8f00">Dirty Flush</text>

  <!-- Change Buffer to Secondary Index -->
  <path d="M 185 300 L 185 240 Q 235 240, 285 240 L 400 240 Q 435 240, 475 160" fill="none" stroke="#7b1fa2" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)" />
  <rect x="385" y="245" width="80" height="20" rx="3" fill="#fae1fc" stroke="#7b1fa2" stroke-width="0.5" />
  <text x="425" y="257" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold" fill="#7b1fa2">Index Merge</text>
</svg>
