<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640" role="img" aria-label="Redis Pub/Sub architecture">
  <rect width="980" height="640" fill="#f7f9fb"/>
  <text x="490" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#263238">Redis Pub/Sub - dual indexes and fan-out</text>
  <text x="490" y="48" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Not the keyspace: channel/pattern maps to client sets; PUBLISH walks subscribers on the main thread</text>

  <!-- Publisher -->
  <rect x="40" y="80" width="160" height="70" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="6"/>
  <text x="120" y="110" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1b5e20">Publisher client</text>
  <text x="120" y="130" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2e7d32">PUBLISH ch msg</text>

  <line x1="200" y1="115" x2="280" y2="115" stroke="#37474f" stroke-width="1.6"/>
  <polygon points="280,115 272,110 272,120" fill="#37474f"/>

  <!-- Server core -->
  <rect x="280" y="70" width="420" height="500" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8" rx="8"/>
  <text x="490" y="98" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0d47a1">redisServer (main thread)</text>

  <rect x="310" y="120" width="360" height="56" fill="#ffffff" stroke="#1565c0" rx="4"/>
  <text x="490" y="145" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#0d47a1">pubsubPublishMessageInternal</text>
  <text x="490" y="163" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#1565c0">exact channel dict, then pattern scan</text>

  <!-- Channel index -->
  <rect x="310" y="200" width="360" height="140" fill="#fff8e1" stroke="#f9a825" rx="4"/>
  <text x="490" y="228" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#f57f17">server.pubsub_channels (kvstore)</text>
  <text x="490" y="250" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#f9a825">channel -&gt; dict of client*</text>
  <text x="490" y="272" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#6d4c41">SUBSCRIBE / UNSUBSCRIBE</text>
  <text x="490" y="294" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#6d4c41">+ client.pubsub_channels (reverse)</text>
  <text x="490" y="320" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#795548">O(subscribers on that channel)</text>

  <!-- Pattern index -->
  <rect x="310" y="360" width="360" height="140" fill="#fce4ec" stroke="#c2185b" rx="4"/>
  <text x="490" y="388" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#ad1457">server.pubsub_patterns (dict)</text>
  <text x="490" y="410" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#c2185b">pattern -&gt; dict of client*</text>
  <text x="490" y="432" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#6d4c41">PSUBSCRIBE / PUNSUBSCRIBE</text>
  <text x="490" y="454" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#6d4c41">+ client.pubsub_patterns (reverse)</text>
  <text x="490" y="480" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#795548">stringmatchlen per pattern on publish</text>

  <text x="490" y="540" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#0d47a1">pubsubshard_channels: slot-scoped twin for SSUBSCRIBE / SPUBLISH</text>

  <!-- Subscribers -->
  <rect x="760" y="100" width="180" height="60" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5" rx="6"/>
  <text x="850" y="125" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#e65100">Subscriber A</text>
  <text x="850" y="145" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#ef6c00">message / push</text>

  <rect x="760" y="190" width="180" height="60" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5" rx="6"/>
  <text x="850" y="215" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#e65100">Subscriber B</text>
  <text x="850" y="235" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#ef6c00">CLIENT_PUBSUB</text>

  <rect x="760" y="280" width="180" height="60" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5" rx="6"/>
  <text x="850" y="305" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ad1457">Pattern client</text>
  <text x="850" y="325" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#c2185b">pmessage</text>

  <line x1="700" y1="270" x2="760" y2="130" stroke="#ef6c00" stroke-width="1.4"/>
  <line x1="700" y1="270" x2="760" y2="220" stroke="#ef6c00" stroke-width="1.4"/>
  <line x1="700" y1="430" x2="760" y2="310" stroke="#c2185b" stroke-width="1.4"/>

  <text x="490" y="610" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#455a64">Fan-out writes RESP into each subscriber buffer; no persistence, no backlog</text>
</svg>
