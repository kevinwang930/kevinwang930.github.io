<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for arrows and filters -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#37474f" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#fcfcfc" rx="8" />

  <!-- Header -->
  <text x="400" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">InnoDB Redo Log: Circular Ring Buffer</text>

  <!-- Circular Buffer Representation -->
  <g transform="translate(30, 60)" filter="url(#shadow)">
    <rect width="440" height="360" fill="#ffffff" stroke="#c62828" stroke-width="2" rx="6" />
    <rect width="440" height="35" fill="#c62828" rx="6" />
    <text x="220" y="22" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Redo Log Space (ib_logfile0, ib_logfile1)</text>

    <!-- Circular Ring drawing using SVG arcs -->
    <g transform="translate(220, 200)">
      <!-- Outer circle -->
      <circle cx="0" cy="0" r="120" fill="none" stroke="#cfd8dc" stroke-width="30" />

      <!-- Active Log Arc (Checkpoint LSN to Write LSN, e.g. 120 deg to 330 deg) -->
      <!-- We can represent sections by overlapping stroke-dasharray/colors, or drawing arcs. -->
      <!-- Let's draw arcs: Active logs (Red/Orange), Free logs (Green) -->
      <!-- Active Log (From -60 deg to 90 deg) -->
      <path d="M 60 -103.9 A 120 120 0 0 1 120 0 A 120 120 0 0 1 0 120" fill="none" stroke="#ff8f00" stroke-width="30" />
      <path d="M 0 120 A 120 120 0 0 1 -120 0" fill="none" stroke="#d84315" stroke-width="30" />

      <!-- Free / Overwriteable Space (from -120 deg to -60 deg) -->
      <path d="M -120 0 A 120 120 0 0 1 -60 -103.9 A 120 120 0 0 1 60 -103.9" fill="none" stroke="#2e7d32" stroke-width="30" />

      <!-- Center labels -->
      <circle cx="0" cy="0" r="85" fill="#ffffff" />
      <text x="0" y="-15" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Logical Ring</text>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">Circular Writes</text>
      <text x="0" y="22" text-anchor="middle" font-family="monospace" font-size="8" fill="#c62828" font-weight="bold">Write-Ahead Log</text>

      <!-- Pointers -->
      <!-- Checkpoint LSN (Start of Active Logs, e.g. at -120 deg) -->
      <g transform="translate(-103.9, -60)">
        <line x1="0" y1="0" x2="-35" y2="-20" stroke="#c62828" stroke-width="2" marker-end="url(#arrow)" />
        <rect x="-125" y="-35" width="85" height="28" fill="#ffebee" stroke="#c62828" rx="2" />
        <text x="-82.5" y="-23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold" fill="#c62828">Checkpoint LSN</text>
        <text x="-82.5" y="-13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="7" fill="#5d4037">Flushed to Tablespace</text>
      </g>

      <!-- Write LSN (End of Active Logs, e.g. at 60 deg) -->
      <g transform="translate(60, -103.9)">
        <line x1="0" y1="0" x2="25" y2="-30" stroke="#d84315" stroke-width="2" marker-end="url(#arrow)" />
        <rect x="25" y="-45" width="80" height="28" fill="#fbe9e7" stroke="#d84315" rx="2" />
        <text x="65" y="-33" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold" fill="#d84315">Write LSN</text>
        <text x="65" y="-23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="7" fill="#5d4037">Current Log Head</text>
      </g>

      <!-- Label Sectors -->
      <text x="80" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold" fill="#bf360c">Active Redo Space</text>
      <text x="80" y="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="7" fill="#ff5722">(Contains un-flushed changes)</text>

      <text x="-10" y="-120" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold" fill="#1b5e20">Free Space</text>
      <text x="-10" y="-132" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="7" fill="#2e7d32">(Safely Overwriteable)</text>
    </g>
  </g>

  <!-- Right Side: Dirty Page Flushing & Advancing Checkpoint -->
  <g transform="translate(500, 60)" filter="url(#shadow)">
    <rect width="270" height="360" fill="#ffffff" stroke="#37474f" stroke-width="2" rx="6" />
    <rect width="270" height="35" fill="#37474f" rx="6" />
    <text x="135" y="22" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Checkpoint &amp; Data Durability</text>

    <!-- Buffer Pool Flushing -->
    <rect x="15" y="55" width="240" height="80" fill="#ffeec2" stroke="#ff8f00" stroke-width="1.5" rx="4" />
    <text x="135" y="75" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#b25a00">In-Memory Buffer Pool</text>
    <text x="135" y="95" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#ff6f00">Contains modified "dirty pages"</text>
    <text x="135" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#ff6f00">waiting to be flushed</text>

    <!-- Flushing operation -->
    <path d="M 135 135 L 135 200" stroke="#ff8f00" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)" />
    <text x="145" y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#e65100" font-weight="bold">Flush list sync</text>

    <!-- Physical Tablespaces on Disk -->
    <rect x="15" y="205" width="240" height="80" fill="#efebe9" stroke="#4e342e" stroke-width="1.5" rx="4" />
    <text x="135" y="225" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#4e342e">On-Disk Tablespaces (*.ibd)</text>
    <text x="135" y="245" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#5d4037">Data and Indexes physically</text>
    <text x="135" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#5d4037">persisted to durable tablespace blocks.</text>

    <text x="135" y="315" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#37474f" font-weight="bold">Advancing the Checkpoint:</text>
    <text x="135" y="330" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#546e7a">As dirty pages are written to tablespace files,</text>
    <text x="135" y="342" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#546e7a">the Checkpoint LSN moves forward in the circular log,</text>
    <text x="135" y="354" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#2e7d32" font-weight="bold">reclaiming overwriteable Free Log Space!</text>
  </g>
</svg>
