<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="RSA encryption and decryption">
  <rect width="920" height="420" fill="#f7f9fb"/>
  <text x="460" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#263238">Asymmetric encryption (RSA)</text>
  <text x="460" y="48" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Public key (n, e) encrypts; private exponent d decrypts. Use OAEP padding in practice.</text>

  <!-- Key pair -->
  <rect x="300" y="70" width="320" height="70" fill="#eceff1" stroke="#546e7a" stroke-width="1.4" rx="8"/>
  <text x="460" y="98" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#37474f">Key pair</text>
  <text x="460" y="122" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#455a64">public (n, e)     private d</text>

  <!-- Encrypt path -->
  <text x="230" y="175" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">Encrypt (confidentiality)</text>

  <rect x="40" y="190" width="120" height="56" fill="#e3f2fd" stroke="#1565c0" rx="6"/>
  <text x="100" y="225" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#0d47a1">m</text>

  <line x1="160" y1="218" x2="200" y2="218" stroke="#37474f" stroke-width="2"/>
  <polygon points="200,218 192,213 192,223" fill="#37474f"/>

  <rect x="200" y="190" width="200" height="56" fill="#e8f5e9" stroke="#2e7d32" rx="6"/>
  <text x="300" y="215" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#1b5e20">c = m^e mod n</text>
  <text x="300" y="235" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#33691e">use public key</text>

  <line x1="400" y1="218" x2="440" y2="218" stroke="#37474f" stroke-width="2"/>
  <polygon points="440,218 432,213 432,223" fill="#37474f"/>

  <rect x="440" y="190" width="120" height="56" fill="#fce4ec" stroke="#c2185b" rx="6"/>
  <text x="500" y="225" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#880e4f">c</text>

  <line x1="560" y1="218" x2="600" y2="218" stroke="#37474f" stroke-width="2"/>
  <polygon points="600,218 592,213 592,223" fill="#37474f"/>

  <rect x="600" y="190" width="200" height="56" fill="#e8f5e9" stroke="#2e7d32" rx="6"/>
  <text x="700" y="215" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#1b5e20">m = c^d mod n</text>
  <text x="700" y="235" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#33691e">use private key</text>

  <line x1="800" y1="218" x2="840" y2="218" stroke="#37474f" stroke-width="2"/>
  <polygon points="840,218 832,213 832,223" fill="#37474f"/>

  <rect x="840" y="190" width="60" height="56" fill="#e3f2fd" stroke="#1565c0" rx="6"/>
  <text x="870" y="225" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#0d47a1">m</text>

  <!-- Sign path -->
  <text x="230" y="290" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#6a1b9a">Sign (authenticity; keys reversed)</text>

  <rect x="40" y="305" width="120" height="56" fill="#f3e5f5" stroke="#6a1b9a" rx="6"/>
  <text x="100" y="340" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#6a1b9a">hash(M)</text>

  <line x1="160" y1="333" x2="200" y2="333" stroke="#6a1b9a" stroke-width="2"/>
  <polygon points="200,333 192,328 192,338" fill="#6a1b9a"/>

  <rect x="200" y="305" width="200" height="56" fill="#f3e5f5" stroke="#6a1b9a" rx="6"/>
  <text x="300" y="330" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#4a148c">s = H^d mod n</text>
  <text x="300" y="350" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">private key signs</text>

  <line x1="400" y1="333" x2="440" y2="333" stroke="#6a1b9a" stroke-width="2"/>
  <polygon points="440,333 432,328 432,338" fill="#6a1b9a"/>

  <rect x="440" y="305" width="120" height="56" fill="#f3e5f5" stroke="#6a1b9a" rx="6"/>
  <text x="500" y="340" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#6a1b9a">sig s</text>

  <line x1="560" y1="333" x2="600" y2="333" stroke="#6a1b9a" stroke-width="2"/>
  <polygon points="600,333 592,328 592,338" fill="#6a1b9a"/>

  <rect x="600" y="305" width="280" height="56" fill="#f3e5f5" stroke="#6a1b9a" rx="6"/>
  <text x="740" y="330" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#4a148c">check H =? s^e mod n</text>
  <text x="740" y="350" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7b1fa2">public key verifies</text>

  <text x="460" y="400" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">RSA encrypts short values (e.g. AES keys); bulk data stays with AES</text>
</svg>
