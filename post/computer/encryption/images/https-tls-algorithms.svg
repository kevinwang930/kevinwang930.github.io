<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="940" height="420" viewBox="0 0 940 420" role="img" aria-label="TLS HTTPS algorithm roles">
  <rect width="940" height="420" fill="#f7f9fb"/>
  <text x="470" y="26" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#263238">HTTPS = HTTP over TLS: algorithm roles</text>
  <text x="470" y="46" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Handshake selects algorithms; application data uses AEAD with keys from the handshake</text>

  <!-- Client / Server -->
  <rect x="40" y="70" width="120" height="50" fill="#e3f2fd" stroke="#1565c0" rx="6"/>
  <text x="100" y="100" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">Client</text>

  <rect x="780" y="70" width="120" height="50" fill="#e3f2fd" stroke="#1565c0" rx="6"/>
  <text x="840" y="100" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">Server</text>

  <line x1="160" y1="95" x2="780" y2="95" stroke="#90a4ae" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="470" y="88" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">TLS record layer</text>

  <!-- Four role boxes -->
  <rect x="40" y="150" width="200" height="130" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" rx="8"/>
  <text x="140" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#f57f17">1. Key exchange</text>
  <text x="140" y="204" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#6d4c41">ECDHE / X25519</text>
  <text x="140" y="224" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#6d4c41">P-256 / P-384</text>
  <text x="140" y="252" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">shared secret</text>
  <text x="140" y="268" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">forward secrecy</text>

  <rect x="260" y="150" width="200" height="130" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" rx="8"/>
  <text x="360" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#6a1b9a">2. Authentication</text>
  <text x="360" y="204" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#4a148c">cert: RSA / ECDSA</text>
  <text x="360" y="224" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#4a148c">sig: RSA-PSS / ECDSA</text>
  <text x="360" y="244" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#4a148c">hash: SHA-256/384</text>
  <text x="360" y="268" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">proves server identity</text>

  <rect x="480" y="150" width="200" height="130" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="8"/>
  <text x="580" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1b5e20">3. Record AEAD</text>
  <text x="580" y="204" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2e7d32">AES-128-GCM</text>
  <text x="580" y="224" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2e7d32">AES-256-GCM</text>
  <text x="580" y="244" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2e7d32">ChaCha20-Poly1305</text>
  <text x="580" y="268" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">encrypts HTTP bytes</text>

  <rect x="700" y="150" width="200" height="130" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="8"/>
  <text x="800" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">4. KDF / transcript</text>
  <text x="800" y="204" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">HKDF-SHA256</text>
  <text x="800" y="224" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">HKDF-SHA384</text>
  <text x="800" y="252" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">derive traffic keys</text>
  <text x="800" y="268" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">bind handshake</text>

  <!-- Bottom examples -->
  <rect x="40" y="300" width="860" height="90" fill="#ffffff" stroke="#546e7a" stroke-width="1.2" rx="8"/>
  <text x="60" y="328" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#37474f">Common TLS 1.3 cipher suites (examples)</text>
  <text x="60" y="352" font-family="Consolas, monospace" font-size="11" fill="#455a64">TLS_AES_128_GCM_SHA256</text>
  <text x="60" y="372" font-family="Consolas, monospace" font-size="11" fill="#455a64">TLS_AES_256_GCM_SHA384</text>
  <text x="420" y="352" font-family="Consolas, monospace" font-size="11" fill="#455a64">TLS_CHACHA20_POLY1305_SHA256</text>
  <text x="420" y="372" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">Groups: x25519, secp256r1; cert sigs: rsa_pss_rsae_sha256, ecdsa_secp256r1_sha256</text>
</svg>
