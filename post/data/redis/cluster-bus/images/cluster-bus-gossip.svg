<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="Redis Cluster bus gossip">
  <rect width="980" height="560" fill="#f7f9fb"/>
  <text x="490" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#263238">Redis Cluster bus - gossip on PING/PONG/MEET</text>
  <text x="490" y="48" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Separate TCP port (base+10000); binary clusterMsg; gossip samples other nodes</text>

  <!-- Node A -->
  <rect x="40" y="100" width="220" height="320" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8" rx="8"/>
  <text x="150" y="130" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0d47a1">Node A</text>
  <text x="150" y="150" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">clusterLink (outbound)</text>
  <rect x="60" y="170" width="180" height="90" fill="#ffffff" stroke="#1565c0" rx="4"/>
  <text x="150" y="198" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#0d47a1">clusterMsg header</text>
  <text x="150" y="218" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">sig RCmb, epochs, slots</text>
  <text x="150" y="236" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">sender, flags, state</text>
  <rect x="60" y="280" width="180" height="100" fill="#fff8e1" stroke="#f9a825" rx="4"/>
  <text x="150" y="308" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#f57f17">gossip[N]</text>
  <text x="150" y="328" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#f9a825">~1/10 of nodes (min 3)</text>
  <text x="150" y="346" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#f9a825">+ all PFAIL nodes</text>
  <text x="150" y="364" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#6d4c41">id, ip, ports, flags</text>

  <!-- Arrow -->
  <line x1="260" y1="260" x2="380" y2="260" stroke="#37474f" stroke-width="2"/>
  <polygon points="380,260 372,255 372,265" fill="#37474f"/>
  <text x="320" y="248" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#37474f">PING</text>
  <line x1="380" y1="290" x2="260" y2="290" stroke="#2e7d32" stroke-width="2"/>
  <polygon points="260,290 268,285 268,295" fill="#2e7d32"/>
  <text x="320" y="312" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2e7d32">PONG</text>

  <!-- Bus -->
  <rect x="380" y="180" width="220" height="160" fill="#eceff1" stroke="#546e7a" stroke-width="1.5" rx="8"/>
  <text x="490" y="210" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#37474f">Cluster bus TCP</text>
  <text x="490" y="232" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#546e7a">port = client_port + 10000</text>
  <text x="490" y="256" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#546e7a">node-to-node only</text>
  <text x="490" y="278" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#546e7a">clusterProcessPacket</text>
  <text x="490" y="300" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#546e7a">clusterProcessGossipSection</text>
  <text x="490" y="322" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">also FAIL, PUBLISH, AUTH, ...</text>

  <!-- Arrow to B -->
  <line x1="600" y1="260" x2="720" y2="260" stroke="#37474f" stroke-width="2"/>
  <polygon points="720,260 712,255 712,265" fill="#37474f"/>

  <!-- Node B -->
  <rect x="720" y="100" width="220" height="320" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8" rx="8"/>
  <text x="830" y="130" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1b5e20">Node B</text>
  <text x="830" y="150" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2e7d32">clusterLink (inbound)</text>
  <rect x="740" y="170" width="180" height="70" fill="#ffffff" stroke="#2e7d32" rx="4"/>
  <text x="830" y="198" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">nodes dict</text>
  <text x="830" y="218" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#558b2f">update from gossip</text>
  <rect x="740" y="260" width="180" height="100" fill="#fff3e0" stroke="#ef6c00" rx="4"/>
  <text x="830" y="288" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">failure reports</text>
  <text x="830" y="308" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">master gossip PFAIL/FAIL</text>
  <text x="830" y="326" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#bf360c">markNodeAsFailingIfNeeded</text>
  <text x="830" y="344" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#795548">quorum of masters</text>

  <text x="490" y="480" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#455a64">Gossip is a sample of the cluster membership view, not a full dump each packet</text>
  <text x="490" y="505" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#455a64">MEET is a special PING that forces the receiver to learn the sender</text>
  <text x="490" y="530" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">Optional ping extensions: hostname, nodename, forgotten, shard id, secret</text>
</svg>
