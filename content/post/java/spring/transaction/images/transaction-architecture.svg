<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="780" viewBox="0 0 1000 780" role="img" aria-label="Spring Transaction layered architecture">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#37474f"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#00695c"/>
    </marker>
  </defs>

  <rect width="1000" height="780" fill="#f7f9fb"/>

  <text x="500" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#263238">Spring Transaction architecture</text>
  <text x="500" y="48" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Declarative AOP and programmatic API share PlatformTransactionManager and ThreadLocal state</text>

  <!-- Layer 1 Application -->
  <g transform="translate(40, 68)">
    <rect width="920" height="88" fill="#ffffff" stroke="#455a64" stroke-width="1.4" rx="5"/>
    <rect width="140" height="88" fill="#455a64" rx="5"/>
    <rect x="120" width="20" height="88" fill="#455a64"/>
    <text x="70" y="50" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Application</text>

    <rect x="160" y="18" width="230" height="52" fill="#eceff1" stroke="#78909c" rx="4"/>
    <text x="275" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#37474f">@Transactional service</text>
    <text x="275" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">declarative entry</text>

    <rect x="410" y="18" width="230" height="52" fill="#eceff1" stroke="#78909c" rx="4"/>
    <text x="525" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#37474f">TransactionTemplate</text>
    <text x="525" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">programmatic entry</text>

    <rect x="660" y="18" width="230" height="52" fill="#eceff1" stroke="#78909c" rx="4"/>
    <text x="775" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#37474f">registerSynchronization</text>
    <text x="775" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">afterCommit hooks (§5)</text>
  </g>

  <line x1="500" y1="156" x2="500" y2="178" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 2 AOP -->
  <g transform="translate(40, 186)">
    <rect width="920" height="100" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" rx="5"/>
    <rect width="140" height="100" fill="#1565c0" rx="5"/>
    <rect x="120" width="20" height="100" fill="#1565c0"/>
    <text x="70" y="42" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">AOP /</text>
    <text x="70" y="60" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Aspect</text>

    <rect x="160" y="16" width="280" height="68" fill="#e3f2fd" stroke="#64b5f6" rx="4"/>
    <text x="300" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#0d47a1">TransactionInterceptor</text>
    <text x="300" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#1565c0">proxy around advice</text>
    <text x="300" y="72" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#546e7a">invoke()</text>

    <rect x="460" y="16" width="280" height="68" fill="#e3f2fd" stroke="#64b5f6" rx="4"/>
    <text x="600" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#0d47a1">TransactionAspectSupport</text>
    <text x="600" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#1565c0">invokeWithinTransaction()</text>
    <text x="600" y="72" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#546e7a">getTransaction → proceed → commit/rollback</text>

    <rect x="760" y="16" width="140" height="68" fill="#e3f2fd" stroke="#64b5f6" rx="4"/>
    <text x="830" y="42" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">Transaction</text>
    <text x="830" y="58" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">Attribute</text>
    <text x="830" y="72" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" fill="#546e7a">from @Transactional</text>
  </g>

  <line x1="500" y1="286" x2="500" y2="308" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 3 Definition &amp; Status -->
  <g transform="translate(40, 316)">
    <rect width="920" height="86" fill="#ffffff" stroke="#2e7d32" stroke-width="1.4" rx="5"/>
    <rect width="140" height="86" fill="#2e7d32" rx="5"/>
    <rect x="120" width="20" height="86" fill="#2e7d32"/>
    <text x="70" y="40" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Contract</text>
    <text x="70" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">metadata</text>

    <rect x="160" y="14" width="360" height="58" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="340" y="36" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">TransactionDefinition</text>
    <text x="340" y="54" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">propagation · isolation · timeout · readOnly · name</text>

    <rect x="540" y="14" width="380" height="58" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="730" y="36" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">TransactionStatus / DefaultTransactionStatus</text>
    <text x="730" y="54" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">newTransaction · savepoint · rollbackOnly · SavepointManager</text>
  </g>

  <line x1="500" y1="402" x2="500" y2="424" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 4 Manager -->
  <g transform="translate(40, 432)">
    <rect width="920" height="120" fill="#ffffff" stroke="#ef6c00" stroke-width="1.4" rx="5"/>
    <rect width="140" height="120" fill="#ef6c00" rx="5"/>
    <rect x="120" width="20" height="120" fill="#ef6c00"/>
    <text x="70" y="50" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Transaction</text>
    <text x="70" y="68" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Manager</text>

    <rect x="160" y="12" width="420" height="44" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="370" y="30" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">PlatformTransactionManager</text>
    <text x="370" y="46" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#ef6c00">getTransaction / commit / rollback</text>

    <rect x="600" y="12" width="320" height="44" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="760" y="30" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#e65100">AbstractPlatformTransactionManager</text>
    <text x="760" y="46" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" fill="#ef6c00">propagation · suspend · sync triggers</text>

    <rect x="160" y="66" width="180" height="40" fill="#ffe0b2" stroke="#ffa726" rx="3"/>
    <text x="250" y="90" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#e65100">DataSourceTM</text>

    <rect x="360" y="66" width="180" height="40" fill="#ffe0b2" stroke="#ffa726" rx="3"/>
    <text x="450" y="90" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#e65100">JpaTransactionManager</text>

    <rect x="560" y="66" width="180" height="40" fill="#ffe0b2" stroke="#ffa726" rx="3"/>
    <text x="650" y="90" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#e65100">HibernateTransactionManager</text>

    <rect x="760" y="66" width="160" height="40" fill="#ffe0b2" stroke="#ffa726" rx="3"/>
    <text x="840" y="90" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#e65100">doBegin / doCommit</text>
  </g>

  <line x1="500" y1="552" x2="500" y2="574" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 5 ThreadLocal hub -->
  <g transform="translate(40, 582)">
    <rect width="920" height="86" fill="#ffffff" stroke="#00838f" stroke-width="1.6" rx="5"/>
    <rect width="140" height="86" fill="#00838f" rx="5"/>
    <rect x="120" width="20" height="86" fill="#00838f"/>
    <text x="70" y="38" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Thread-</text>
    <text x="70" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">local hub</text>

    <rect x="160" y="12" width="740" height="62" fill="#e0f7fa" stroke="#4dd0e1" rx="4"/>
    <text x="530" y="34" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#006064">TransactionSynchronizationManager</text>
    <text x="530" y="54" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#00838f">resources: DataSource → ConnectionHolder &#160;|&#160; synchronizations: afterCommit / afterCompletion &#160;|&#160; tx name, isolation, readOnly</text>
  </g>

  <line x1="280" y1="668" x2="280" y2="690" stroke="#00695c" stroke-width="1.4" marker-end="url(#arrTeal)"/>
  <line x1="720" y1="668" x2="720" y2="690" stroke="#00695c" stroke-width="1.4" marker-end="url(#arrTeal)"/>

  <!-- Layer 6 Resources -->
  <g transform="translate(40, 698)">
    <rect width="440" height="62" fill="#ffffff" stroke="#5d4037" stroke-width="1.3" rx="4"/>
    <text x="220" y="24" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#4e342e">Transactional resources</text>
    <text x="220" y="44" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#5d4037">JDBC Connection · JPA EntityManager · Hibernate Session</text>

    <rect x="480" width="440" height="62" fill="#ffffff" stroke="#c62828" stroke-width="1.3" rx="4"/>
    <text x="700" y="24" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#b71c1c">TransactionSynchronization callbacks</text>
    <text x="700" y="44" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#c62828">beforeCommit → doCommit → afterCommit → afterCompletion</text>
  </g>
</svg>
