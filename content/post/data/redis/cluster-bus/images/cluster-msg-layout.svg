<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-label="clusterMsg wire layout">
  <rect width="920" height="520" fill="#f7f9fb"/>
  <text x="460" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#263238">clusterMsg - binary bus packet (logical layout)</text>
  <text x="460" y="48" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">sig RCmb, protocol ver 1; header describes sender; data depends on type</text>

  <!-- Header block -->
  <rect x="40" y="70" width="840" height="200" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8" rx="8"/>
  <text x="60" y="95" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#0d47a1">HEADER (fixed)</text>

  <rect x="60" y="110" width="120" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="120" y="128" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">sig[4]</text>
  <text x="120" y="144" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">RCmb</text>

  <rect x="190" y="110" width="100" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="240" y="128" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">totlen</text>
  <text x="240" y="144" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">u32</text>

  <rect x="300" y="110" width="70" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="335" y="128" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">ver</text>
  <text x="335" y="144" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">u16</text>

  <rect x="380" y="110" width="90" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="425" y="128" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">ports</text>
  <text x="425" y="144" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">client/bus</text>

  <rect x="480" y="110" width="90" height="44" fill="#fff8e1" stroke="#f9a825" rx="3"/>
  <text x="525" y="128" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#f57f17">type</text>
  <text x="525" y="144" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#f9a825">CLUSTERMSG_*</text>

  <rect x="580" y="110" width="90" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="625" y="128" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">count</text>
  <text x="625" y="144" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">gossip N</text>

  <rect x="680" y="110" width="180" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="770" y="128" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">epochs + offset</text>
  <text x="770" y="144" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">current / config / repl</text>

  <rect x="60" y="168" width="200" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="160" y="186" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">sender[40]</text>
  <text x="160" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">node id</text>

  <rect x="270" y="168" width="280" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="410" y="186" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">myslots[CLUSTER_SLOTS/8]</text>
  <text x="410" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">16384-bit slot bitmap</text>

  <rect x="560" y="168" width="140" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="630" y="186" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">slaveof[40]</text>
  <text x="630" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">master id</text>

  <rect x="710" y="168" width="150" height="44" fill="#ffffff" stroke="#1565c0" rx="3"/>
  <text x="785" y="186" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="700" fill="#0d47a1">flags / state</text>
  <text x="785" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">+ myip, mflags, ...</text>

  <text x="60" y="250" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#546e7a">Receivers always refresh the sender from this header, regardless of type.</text>

  <!-- Arrow -->
  <line x1="460" y1="278" x2="460" y2="300" stroke="#37474f" stroke-width="2"/>
  <polygon points="460,300 455,292 465,292" fill="#37474f"/>

  <!-- Data block -->
  <rect x="40" y="308" width="840" height="180" fill="#fff8e1" stroke="#f9a825" stroke-width="1.8" rx="8"/>
  <text x="60" y="333" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#f57f17">DATA (by type)</text>

  <rect x="60" y="348" width="250" height="56" fill="#ffffff" stroke="#f9a825" rx="3"/>
  <text x="185" y="370" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">PING / PONG / MEET</text>
  <text x="185" y="390" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6d4c41">gossip[count] + optional extensions</text>

  <rect x="325" y="348" width="160" height="56" fill="#ffffff" stroke="#f9a825" rx="3"/>
  <text x="405" y="370" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">FAIL</text>
  <text x="405" y="390" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6d4c41">nodename[40]</text>

  <rect x="500" y="348" width="170" height="56" fill="#ffffff" stroke="#f9a825" rx="3"/>
  <text x="585" y="370" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">PUBLISH*</text>
  <text x="585" y="390" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6d4c41">channel + payload bytes</text>

  <rect x="685" y="348" width="175" height="56" fill="#ffffff" stroke="#f9a825" rx="3"/>
  <text x="772" y="370" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">UPDATE</text>
  <text x="772" y="390" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6d4c41">epoch, name, slots bitmap</text>

  <rect x="60" y="418" width="250" height="50" fill="#ffffff" stroke="#f9a825" rx="3"/>
  <text x="185" y="440" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">MODULE</text>
  <text x="185" y="458" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6d4c41">module_id, type, payload</text>

  <rect x="325" y="418" width="535" height="50" fill="#ffffff" stroke="#f9a825" rx="3"/>
  <text x="592" y="440" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">FAILOVER_AUTH_* / MFSTART</text>
  <text x="592" y="458" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6d4c41">header only (meaning in type + epochs / mflags)</text>

  <text x="460" y="505" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#78909c">Not byte-accurate; field offsets are ABI-stable in cluster_legacy.h</text>
</svg>
