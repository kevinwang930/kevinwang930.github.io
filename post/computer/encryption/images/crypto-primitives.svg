<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" role="img" aria-label="Cryptographic primitive classes">
  <rect width="920" height="380" fill="#f7f9fb"/>
  <text x="460" y="26" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#263238">Primitive classes (not interchangeable)</text>
  <text x="460" y="46" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Encoding is not cryptography; hashing is not encryption; keys need a CSPRNG</text>

  <rect x="24" y="70" width="210" height="160" fill="#eceff1" stroke="#546e7a" stroke-width="1.5" rx="8"/>
  <text x="129" y="98" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#37474f">Encoding</text>
  <text x="129" y="122" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#455a64">Hex, Base64</text>
  <text x="129" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#546e7a">reversible, no secret</text>
  <text x="129" y="168" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#546e7a">transport / display</text>
  <text x="129" y="200" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">not confidentiality</text>

  <rect x="250" y="70" width="210" height="160" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" rx="8"/>
  <text x="355" y="98" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#f57f17">Hash</text>
  <text x="355" y="122" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#f57f17">MD5, SHA-*</text>
  <text x="355" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#6d4c41">one-way digest</text>
  <text x="355" y="168" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#6d4c41">integrity / fingerprint</text>
  <text x="355" y="200" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">not reversible</text>

  <rect x="476" y="70" width="210" height="160" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="8"/>
  <text x="581" y="98" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">Symmetric</text>
  <text x="581" y="122" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#1565c0">AES</text>
  <text x="581" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#546e7a">shared secret key</text>
  <text x="581" y="168" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#546e7a">confidentiality</text>
  <text x="581" y="200" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">encrypt / decrypt</text>

  <rect x="702" y="70" width="194" height="160" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="8"/>
  <text x="799" y="98" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1b5e20">Asymmetric</text>
  <text x="799" y="122" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#2e7d32">RSA</text>
  <text x="799" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#33691e">public / private</text>
  <text x="799" y="168" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#33691e">key transport, sign</text>
  <text x="799" y="200" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">encrypt or verify</text>

  <rect x="24" y="250" width="872" height="100" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.4" rx="8"/>
  <text x="460" y="280" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#6a1b9a">Composition in protocols</text>
  <text x="460" y="304" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#546e7a">SASL: authentication framework over pluggable mechanisms</text>
  <text x="460" y="326" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#546e7a">Signatures (e.g. OpenPGP): private-key operation to sign; public-key operation to verify</text>
</svg>
