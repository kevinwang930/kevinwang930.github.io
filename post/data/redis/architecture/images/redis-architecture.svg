<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680" role="img" aria-label="Redis overall architecture and command path">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#37474f"/>
    </marker>
  </defs>

  <rect width="1000" height="680" fill="#f7f9fb"/>
  <text x="500" y="26" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#263238">Redis overall architecture</text>
  <text x="500" y="46" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#607d8b">Event loop owns the keyspace; I/O threads may read/write sockets; expire runs lazy and active</text>

  <!-- Row 1: clients + I/O + ae -->
  <g transform="translate(40, 66)">
    <rect width="180" height="90" fill="#ffffff" stroke="#455a64" stroke-width="1.4" rx="5"/>
    <text x="90" y="32" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#37474f">Clients</text>
    <text x="90" y="54" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#546e7a">RESP / TCP</text>
    <text x="90" y="72" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#78909c">pipelining OK</text>
  </g>

  <line x1="220" y1="111" x2="268" y2="111" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <g transform="translate(270, 66)">
    <rect width="220" height="90" fill="#ffffff" stroke="#1565c0" stroke-width="1.4" rx="5"/>
    <text x="110" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">Networking / I/O</text>
    <text x="110" y="50" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">main or IO threads</text>
    <text x="110" y="68" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">read query / write reply</text>
    <text x="110" y="84" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">processInputBuffer</text>
  </g>

  <line x1="490" y1="111" x2="538" y2="111" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <g transform="translate(540, 66)">
    <rect width="420" height="90" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="5"/>
    <text x="210" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0d47a1">ae event loop (main thread)</text>
    <text x="210" y="50" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565c0">aeMain · beforeSleep · serverCron</text>
    <text x="210" y="68" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">file events + time events (hz)</text>
    <text x="210" y="84" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#546e7a">sole owner of keyspace mutations</text>
  </g>

  <line x1="500" y1="156" x2="500" y2="186" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Command path -->
  <g transform="translate(40, 194)">
    <rect width="920" height="100" fill="#ffffff" stroke="#2e7d32" stroke-width="1.4" rx="5"/>
    <rect width="130" height="100" fill="#2e7d32" rx="5"/>
    <rect x="110" width="20" height="100" fill="#2e7d32"/>
    <text x="65" y="46" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Command</text>
    <text x="65" y="64" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">path</text>

    <rect x="150" y="16" width="170" height="68" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="235" y="42" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">lookupCommand</text>
    <text x="235" y="60" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">arity · ACL · flags</text>

    <rect x="340" y="16" width="170" height="68" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="425" y="42" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">processCommand</text>
    <text x="425" y="60" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">MULTI queue or call</text>

    <rect x="530" y="16" width="170" height="68" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="615" y="42" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">call / cmd-&#62;proc</text>
    <text x="615" y="60" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">lookupKey · mutate</text>

    <rect x="720" y="16" width="180" height="68" fill="#e8f5e9" stroke="#81c784" rx="4"/>
    <text x="810" y="42" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1b5e20">propagate + reply</text>
    <text x="810" y="60" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2e7d32">AOF · replicas · client</text>
  </g>

  <line x1="500" y1="294" x2="500" y2="324" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Keyspace -->
  <g transform="translate(40, 332)">
    <rect width="920" height="96" fill="#ffffff" stroke="#ef6c00" stroke-width="1.4" rx="5"/>
    <rect width="130" height="96" fill="#ef6c00" rx="5"/>
    <rect x="110" width="20" height="96" fill="#ef6c00"/>
    <text x="65" y="44" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Keyspace</text>
    <text x="65" y="62" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">redisDb</text>

    <rect x="150" y="14" width="230" height="68" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="265" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">kvstore *keys</text>
    <text x="265" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">key -&#62; kvobj</text>

    <rect x="400" y="14" width="230" height="68" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="515" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">kvstore *expires</text>
    <text x="515" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">keys with TTL</text>

    <rect x="650" y="14" width="250" height="68" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="775" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#e65100">blocking / watched</text>
    <text x="775" y="58" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#ef6c00">BLPOP · WATCH · ready_keys</text>
  </g>

  <!-- Bottom: concurrency + expire -->
  <g transform="translate(40, 456)">
    <rect width="450" height="180" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.4" rx="5"/>
    <text x="225" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#4a148c">Concurrency control</text>
    <text x="24" y="56" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#6a1b9a">· Single-threaded command execution</text>
    <text x="24" y="76" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#6a1b9a">· No per-key locks on the hot path</text>
    <text x="24" y="96" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#6a1b9a">· I/O threads: socket only, hand off to main</text>
    <text x="24" y="116" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#6a1b9a">· MULTI/EXEC: queue then run atomically</text>
    <text x="24" y="136" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#6a1b9a">· WATCH: optimistic CAS (DIRTY_CAS)</text>
    <text x="24" y="156" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#6a1b9a">· Blocked clients: park until key ready</text>

    <rect x="470" width="450" height="180" fill="#ffffff" stroke="#00838f" stroke-width="1.4" rx="5"/>
    <text x="695" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#006064">Expire mechanism</text>
    <text x="494" y="56" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#00838f">· Lazy: expireIfNeeded on lookupKey</text>
    <text x="494" y="76" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#00838f">· Active slow: databasesCron (hz)</text>
    <text x="494" y="96" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#00838f">· Active fast: beforeSleep when stale</text>
    <text x="494" y="116" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#00838f">· Sample expires dict; time-budgeted</text>
    <text x="494" y="136" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#00838f">· Replica: master-driven DEL (usually)</text>
    <text x="494" y="156" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#00838f">· Field TTL via subexpires (hashes)</text>
  </g>
</svg>
